<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRISM Report an Issue</title>
  <style>
    :root { --blue:#2f89ff; --ink:#111735; --field:#d9d9d9; --line:#dedede; --text:#101010; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:#fff; color:var(--text); font-family:Arial, Helvetica, sans-serif; }
    .page { min-height:100vh; border:1px solid #1b1b1b; }
    .header { height:48px; background:#e8e8ed; border-bottom:4px solid var(--blue); display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:0 20px; }
    .logo { font-weight:800; font-size:18px; }
    .home { justify-self:end; width:76px; padding:7px 0; border-radius:5px; background:#6a6a6a; color:#fff; text-align:center; text-decoration:none; font-size:12px; transition:transform .15s ease, filter .15s ease; }
    .home:hover,.home:focus-visible { transform:translateY(-1px); filter:brightness(1.08); outline:1px solid #fff; outline-offset:2px; }
    .main { min-height:calc(100vh - 52px); display:flex; justify-content:center; align-items:flex-start; padding:58px 18px 34px; }
    .card { width:330px; border:1px solid var(--line); border-radius:8px; background:#fbfbfb; padding:18px 24px 20px; box-shadow:0 2px 3px rgba(0,0,0,.22); }
    h1 { margin:0 0 16px; text-align:center; font-size:15px; line-height:1.25; }
    label { display:block; margin-bottom:12px; font-size:11px; font-weight:700; }
    label span { display:block; margin-bottom:5px; }
    select,input,textarea { width:100%; border:0; border-radius:4px; background:var(--field); color:#111; font:inherit; font-weight:400; }
    select,input { height:27px; padding:0 9px; font-size:10px; }
    textarea { height:96px; resize:vertical; padding:9px; font-size:10px; }
    .upload-box { min-height:84px; border:1.5px dashed #a7a7a7; border-radius:5px; background:#fff; display:grid; place-items:center; text-align:center; color:#777; font-size:32px; cursor:pointer; transition:border-color .15s ease, background .15s ease, transform .15s ease; }
    .upload-box:hover,.upload-box:focus-within { border-color:var(--blue); background:#f5f9ff; transform:translateY(-1px); }
    .upload-box input { position:absolute; opacity:0; pointer-events:none; }
    .upload-note { display:block; margin-top:5px; color:#666; font-size:9px; font-weight:400; }
    .submit { width:100%; height:28px; border:0; border-radius:4px; background:var(--ink); color:#fff; font-size:11px; font-weight:700; cursor:pointer; transition:transform .15s ease, filter .15s ease, box-shadow .15s ease; }
    .submit:hover,.submit:focus-visible { transform:translateY(-1px); filter:brightness(1.08); box-shadow:0 4px 8px rgba(0,0,0,.22); outline:none; }
    .submit:active { transform:scale(.98); }
    @media (max-width:420px){.header{grid-template-columns:1fr auto}.card{width:100%;}.main{padding-top:32px}}
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <div class="logo">PRISM</div>
      <div></div>
      <a class="home" href="home.html">Home</a>
    </header>

    <section class="main">
      <form class="card">
        <h1>Report an Infrastructure Issue</h1>
        <label><span>Issue Type / Uri:</span><select><option>Pothole, Broken Streetlight, Road Damage, Others</option><option>Flooding</option><option>Water Pipe Repair</option><option>Road Closure</option></select></label>
        <label><span>Description / Detalye:</span><textarea>Ex. Pothole needs urgent attention</textarea></label>
        <label><span>Exact Name / Pangalan ng Lugar:</span><input type="text" value="" /></label>
        <label><span>Upload Photo / I-upload ang Larawan:</span><span class="upload-box" tabindex="0"><input type="file" accept="image/*" />☁<span class="upload-note">Click to upload photo</span></span></label>
        <button class="submit" type="submit">Submit Report / Magsumite ng Ulat</button>
      </form>
    </section>
  </main>
</body>
</html>
