<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRISM Contractor | Dashboard</title>   
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #0a0944; --blue: #3b82f6; --ink: #111111; --page: #f0f2f5; --panel: #ffffff; --line: #cfcfcf; --text: #101010; --grey-label: #666; --shadow: 0 2px 8px rgba(0,0,0,.08); }
    * { box-sizing: border-box; } body { margin: 0; min-height: 100vh; color: var(--text); font-family: 'Poppins', sans-serif; background: var(--page); }
    .dashboard-shell { display: grid; grid-template-columns: 260px minmax(0, 1fr); min-height: 100vh; }
    .sidebar { background: var(--navy); color: white; padding: 34px 20px; display: flex; flex-direction: column; align-items: center; }
    .brand { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 40px; font-size: 24px; font-weight: 800; text-align: center; } .sj-logo { width: 70px; }
    .side-nav { width: 100%; display: grid; gap: 10px; } .nav-item { min-height: 44px; border-radius: 8px; display: flex; align-items: center; padding: 0 14px; font-size: 14px; font-weight: 500; text-decoration: none; color: rgba(255,255,255,0.7); } .nav-item.active { background: var(--blue); color: #fff; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
    .dashboard-content { padding: 32px clamp(20px, 4vw, 40px); display: flex; flex-direction: column; gap: 24px; }
    .topbar { display: flex; justify-content: space-between; gap: 24px; } h1 { margin: 0 0 8px; font-size: 28px; }
    
    .profile-wrapper { position: relative; } .profile { width: 42px; height: 42px; border: 1.5px solid #111; border-radius: 50%; display: grid; place-items: center; font-size: 22px; background: #fff; cursor: pointer; } .profile::before { content: '\1F464'; position: absolute; }
    .profile-dropdown { position: absolute; top: calc(100% + 12px); right: 0; background: var(--panel); border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); width: 200px; padding: 16px; display: flex; flex-direction: column; gap: 12px; opacity: 0; visibility: hidden; z-index: 2000; }
    .profile-dropdown.active { opacity: 1; visibility: visible; } .profile-dropdown a { display: flex; justify-content: center; align-items: center; height: 40px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; } .btn-logout { background: #ef4444; color: white; }
    
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
    .stat-card { background: var(--panel); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); }
    .stat-card p { margin: 0 0 10px; font-size: 14px; color: var(--grey-label); font-weight: 600; text-transform: uppercase; } .stat-card strong { font-size: 32px; color: var(--ink); font-weight: 700; }
    .alert-card { background: #fef2f2; border: 1px solid #fecaca; border-left: 4px solid #ef4444; } .alert-card p { color: #991b1b; } .alert-card strong { color: #7f1d1d; }
    .success-card { background: #f0fdf4; border: 1px solid #bbf7d0; border-left: 4px solid #10b981; } .success-card p { color: #166534; } .success-card strong { color: #14532d; }

    .project-list { display: grid; gap: 24px; }
    .project-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; box-shadow: var(--shadow); padding: 24px; display: grid; grid-template-columns: 1fr auto auto; gap: 20px; align-items: center; }
    .project-card h2 { grid-column: 1 / -1; margin: 0 0 5px; font-size: 22px; } .project-card p { grid-column: 1 / -1; margin: 0; font-size: 14px; color: var(--grey-label); }
    
    select { width: 220px; height: 44px; border: 1px solid var(--line); border-radius: 8px; background: #f9fafb; padding: 0 14px; font-family: 'Poppins', sans-serif; font-size: 14px; cursor: pointer; }
    .btn-upload { display: inline-flex; align-items: center; justify-content: center; height: 44px; padding: 0 24px; border: none; border-radius: 8px; background: var(--navy); color: #fff; font-family: 'Poppins', sans-serif; font-weight: 600; cursor: pointer; position: relative; }
    .file-input-hidden { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
  </style>
</head>
<body>
  <main class="dashboard-shell">
    <aside class="sidebar">
      <div class="brand"><img src="https://upload.wikimedia.org/wikipedia/commons/3/34/Seal_of_San_Juan%2C_Metro_Manila.png?_=20200209173841" class="sj-logo"> PRISM</div>
      <nav class="side-nav"><a class="nav-item active" href="contractor-dashboard.html">Assigned Projects</a></nav>
    </aside>

    <section class="dashboard-content">
      <header class="topbar">
        <div><h1>Welcome, DEVEX INC.</h1></div>
        <div class="profile-wrapper">
          <div class="profile" id="profileBtn"></div>
          <div class="profile-dropdown" id="profileDropdown"><a href="homepage for user without acc.html" class="btn-logout">Log Out</a></div>
        </div>
      </header>

      <section class="stats">
        <article class="stat-card"><p>Assigned Projects</p><strong id="ct-assigned">0</strong></article>
        <article class="stat-card alert-card"><p>Updates Required Today</p><strong id="ct-updates">0</strong></article>
        <article class="stat-card success-card"><p>Total Completed Work</p><strong id="ct-completed">0</strong></article>
      </section>

      <h2 style="font-size: 20px; font-weight: 600; margin-top: 10px;">My Active Workspace</h2>
      <section class="project-list" id="contractorWorkspace">
        </section>
    </section>
  </main>

  <script>
    function loadContractorWorkspace() {
      const allProjects = JSON.parse(localStorage.getItem('prism_projects') || '[]');
      
      // Filter out ONLY the projects assigned to DEVEX (or whatever contractor is logged in)
      const myProjects = allProjects.filter(p => p.contractor.includes("DEVEX"));
      
      let pendingUpdates = 0; let completed = 0;
      const workspace = document.getElementById('contractorWorkspace');
      workspace.innerHTML = "";

      myProjects.forEach(p => {
        if(p.status === 'completed') completed++;
        if(p.status === 'planning' || p.status === 'progress') pendingUpdates++;
        
        // Let's find the original array index so we can update the database correctly
        let originalIndex = allProjects.findIndex(proj => proj.name === p.name);

        workspace.innerHTML += `
          <article class="project-card">
            <h2>${p.name}</h2>
            <p>Location: ${p.location} | Budget: ₱ ${p.budget}M</p>
            <select onchange="updateProjectStatus(${originalIndex}, this.value)">
              <option value="planning" ${p.status === 'planning' ? 'selected' : ''}>Status: Planning</option>
              <option value="progress" ${p.status === 'progress' ? 'selected' : ''}>Status: In Progress</option>
              <option value="delayed" ${p.status === 'delayed' ? 'selected' : ''}>Status: Delayed</option>
              <option value="completed" ${p.status === 'completed' ? 'selected' : ''}>Status: Completed</option>
            </select>
            <label class="btn-upload">
              <span class="upload-text">📎 Upload Progress</span>
              <input type="file" class="file-input-hidden" accept="image/*" onchange="markUploaded(this)" />
            </label>
          </article>`;
      });

      document.getElementById('ct-assigned').innerText = myProjects.length;
      document.getElementById('ct-updates').innerText = pendingUpdates;
      document.getElementById('ct-completed').innerText = completed;
    }

    // Pushes status change to Database!
    window.updateProjectStatus = function(index, newStatus) {
      const projects = JSON.parse(localStorage.getItem('prism_projects'));
      projects[index].status = newStatus;
      if(newStatus === 'completed') projects[index].completion = "100%";
      if(newStatus === 'progress') projects[index].completion = "50%";
      localStorage.setItem('prism_projects', JSON.stringify(projects));
      loadContractorWorkspace(); // Reload UI to update the stats cards
    };

    // UX Visual Feedback
    window.markUploaded = function(inputElement) {
      if (inputElement.files.length > 0) {
        const label = inputElement.closest('.btn-upload');
        label.querySelector('.upload-text').textContent = '✅ ' + inputElement.files[0].name;
        label.style.background = '#10b981';
      }
    };

    loadContractorWorkspace();

    // Profile Menu Logic
    const profileBtn = document.getElementById('profileBtn');
    const profileDropdown = document.getElementById('profileDropdown');
    profileBtn.onclick = (e) => { e.stopPropagation(); profileDropdown.classList.toggle('active'); };
    window.onclick = (e) => { if(!profileDropdown.contains(e.target) && e.target !== profileBtn) profileDropdown.classList.remove('active'); };
  </script>
</body>
</html>
