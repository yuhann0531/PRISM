<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRISM Contractor Dashboard</title>
  <style>
    :root { --navy:#211f78; --blue:#2f89ff; --ink:#111735; --line:#d4d4d4; --panel:#f8f8f8; --text:#101010; --shadow:0 2px 5px rgba(0,0,0,.24); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:#1f1f1f; color:var(--text); font-family:Arial, Helvetica, sans-serif; display:grid; place-items:center; padding:36px; }
    .frame { width:min(1100px,100%); min-height:620px; background:#fff; border:4px solid #169bff; display:grid; grid-template-columns:280px 1fr; }
    .sidebar { background:var(--navy); color:#fff; padding:34px 24px; display:flex; flex-direction:column; align-items:center; }
    .brand { font-size:34px; font-weight:800; margin-bottom:48px; }
    .nav { width:100%; display:grid; gap:10px; }
    .nav a { min-height:44px; border-radius:6px; background:var(--blue); color:#fff; display:flex; align-items:center; gap:10px; padding:0 14px; text-decoration:none; font-size:14px; transition:transform .15s ease, filter .15s ease, box-shadow .15s ease; }
    .nav a:hover, .nav a:focus-visible, .logout:hover, .logout:focus-visible { transform:translateY(-2px); filter:brightness(1.08); outline:1px solid rgba(255,255,255,.9); outline-offset:2px; }
    .grid-icon { width:20px; height:20px; display:grid; grid-template-columns:repeat(2,1fr); gap:3px; }
    .grid-icon span { border:1px solid rgba(255,255,255,.8); border-radius:3px; }
    .logout { margin-top:auto; align-self:flex-start; color:#fff; text-decoration:none; font-size:14px; transition:transform .15s ease, filter .15s ease; }
    .content { padding:48px 28px 46px; overflow:auto; }
    .topbar { display:flex; justify-content:space-between; gap:20px; align-items:flex-start; margin-bottom:34px; }
    h1 { margin:0 0 8px; font-size:34px; line-height:1; }
    .status { font-size:14px; }
    .profile { width:42px; height:42px; border:1.5px solid #111; border-radius:50%; position:relative; flex:0 0 auto; }
    .profile:before,.profile:after { content:""; position:absolute; left:50%; transform:translateX(-50%); border:1px solid #111; }
    .profile:before { top:8px; width:12px; height:12px; border-radius:50%; background:#fff; }
    .profile:after { bottom:7px; width:24px; height:13px; border-radius:15px 15px 0 0; border-bottom:0; }
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:26px; margin-bottom:54px; }
    .card { min-height:105px; background:var(--panel); border:1px solid var(--line); border-radius:7px; box-shadow:var(--shadow); padding:20px; }
    .card p { margin:0 0 17px; font-size:15px; }
    .card strong { font-size:30px; }
    .project-list { display:grid; gap:28px; }
    .project-card { background:#f8f8f8; border:1px solid var(--line); border-radius:7px; box-shadow:var(--shadow); padding:22px; display:grid; grid-template-columns:1fr auto; gap:18px; align-items:center; }
    .project-card h2 { grid-column:1 / -1; margin:0 0 2px; font-size:28px; }
    select { width:250px; height:34px; border:0; border-radius:4px; background:#d9d9d9; padding:0 12px; font-size:13px; }
    .upload { width:250px; height:34px; border:0; border-radius:4px; background:#8b8b8b; color:#fff; font-weight:800; font-size:13px; cursor:pointer; transition:transform .15s ease, filter .15s ease, box-shadow .15s ease; }
    .upload:hover, .upload:focus-visible { transform:translateY(-2px); filter:brightness(1.08); box-shadow:0 5px 9px rgba(0,0,0,.25); outline:none; }
    @media (max-width:850px){ body{padding:0;place-items:stretch}.frame{min-height:100vh;border:0;grid-template-columns:150px 1fr}.sidebar{padding:24px 10px}.brand{font-size:24px}.content{padding:28px 16px}.stats,.project-card{grid-template-columns:1fr}.upload,select{width:100%} }
  </style>
</head>
<body>
  <main class="frame">
    <aside class="sidebar">
      <div class="brand">PRISM</div>
      <nav class="nav">
        <a href="contractor-dashboard.html" aria-current="page"><span class="grid-icon"><span></span><span></span><span></span><span></span></span>Dashboard</a>
      </nav>
      <a class="logout" href="login.html">↩ Log Out</a>
    </aside>
    <section class="content">
      <header class="topbar">
        <div><h1>Welcome, BuildCorp Inc.</h1><div class="status">System Status: Operational | 06/12/2026</div></div>
        <div class="profile" aria-label="User profile"></div>
      </header>
      <section class="stats">
        <article class="card"><p>Assigned Projects</p><strong>2</strong></article>
        <article class="card"><p>Updates Required</p><strong>2</strong></article>
        <article class="card"><p>Completed Work</p><strong>12</strong></article>
      </section>
      <section class="project-list">
        <article class="project-card">
          <h2>Main St. Resurfacing</h2>
          <select><option>Status: In Progress</option><option>Status: Planning</option><option>Status: Completed</option></select>
          <button class="upload">Upload Progress Photo</button>
        </article>
        <article class="project-card">
          <h2>Bridge Replacement</h2>
          <select><option>Status: Planning</option><option>Status: In Progress</option><option>Status: Completed</option></select>
          <button class="upload">Upload Progress Photo</button>
        </article>
      </section>
    </section>
  </main>
</body>
</html>
