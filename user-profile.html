<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRISM | User Profile</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --navy: #0a0944; --blue: #3b82f6; --ink: #111111; --page: #f0f2f5;
      --panel: #ffffff; --line: #e5e7eb; --field: #f9fafb; --text: #1f2937;
      --grey-label: #4b5563; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--text); font-family: 'Poppins', sans-serif; background: var(--page); display: flex; flex-direction: column; }
    
    /* Header */
    .auth-header { height: 70px; background: var(--navy); display: flex; justify-content: space-between; align-items: center; padding: 0 5%; box-shadow: 0 2px 8px rgba(0,0,0,0.15); position: sticky; top: 0; z-index: 100; }
    .brand { display: flex; align-items: center; gap: 12px; color: #fff; font-size: 22px; font-weight: 800; letter-spacing: 1px; text-decoration: none;}
    .sj-logo { width: 40px; height: auto; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    
    .nav-links { display: flex; gap: 8px; align-items: center; }
    .nav-link { padding: 8px 16px; border-radius: 6px; color: #fff; text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.2s ease; }
    .nav-link:hover { background: rgba(255,255,255,0.1); }
    .btn-logout { background: #ef4444; }
    .btn-logout:hover { background: #dc2626; transform: translateY(-1px); box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); }

    /* Main Content */
    .profile-main { width: 100%; max-width: 1000px; margin: 40px auto; padding: 0 20px; }
    
    .page-header { margin-bottom: 32px; display: flex; justify-content: space-between; align-items: flex-start; }
    .page-header h1 { margin: 0 0 4px; font-size: clamp(28px, 4vw, 36px); font-weight: 800; color: var(--ink); line-height: 1.2; }
    .page-header p { margin: 0; font-size: 15px; color: var(--grey-label); }
    
    .profile-layout { display: grid; grid-template-columns: 320px 1fr; gap: 24px; align-items: start; }
    
    /* Left Card: Identity & Stats */
    .identity-card { background: var(--panel); border-radius: 16px; padding: 32px 24px; box-shadow: var(--shadow); text-align: center; }
    .avatar { width: 120px; height: 120px; border-radius: 50%; background: #eff6ff; color: var(--blue); margin: 0 auto 20px; display: grid; place-items: center; font-size: 48px; font-weight: 800; border: 4px solid #dbeafe; }
    .identity-card h2 { margin: 0 0 4px; font-size: 22px; font-weight: 700; color: var(--ink); }
    .role-badge { display: inline-block; padding: 4px 12px; background: #f3f4f6; color: var(--grey-label); border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 24px; }
    
    .quick-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat-box { background: var(--field); border: 1px solid var(--line); border-radius: 8px; padding: 12px 8px; }
    .stat-box span { display: block; font-size: 11px; color: var(--grey-label); text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
    .stat-box strong { font-size: 20px; color: var(--navy); font-weight: 800; }
    
    /* Right Card: Form Details */
    .details-card { background: var(--panel); border-radius: 16px; padding: 32px; box-shadow: var(--shadow); display: grid; gap: 20px; }
    .form-field { display: block; }
    .form-field span { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: var(--grey-label); }
    .form-input, textarea { width: 100%; border: 1px solid var(--line); border-radius: 8px; background: var(--field); padding: 12px 14px; font-family: 'Poppins', sans-serif; font-size: 14px; color: var(--text); transition: all 0.2s ease; }
    textarea { min-height: 100px; resize: vertical; }
    .form-input:focus, textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); background: #fff; }
    
    .actions { display: flex; justify-content: flex-end; gap: 16px; margin-top: 12px; border-top: 1px solid var(--line); padding-top: 24px; }
    .btn { padding: 12px 24px; border: none; border-radius: 8px; font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s ease; }
    .btn-secondary { background: #f0f2f5; color: var(--ink); }
    .btn-secondary:hover { background: #e5e7eb; transform: translateY(-1px); }
    .btn-primary { background: var(--navy); color: #fff; }
    .btn-primary:hover { background: var(--blue); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }

    @media (max-width: 850px) {
      .profile-layout { grid-template-columns: 1fr; }
      .auth-header { flex-direction: column; padding: 16px; height: auto; gap: 16px; }
      .nav-links { flex-wrap: wrap; justify-content: center; }
    }
  </style>
</head>
<body>
  
  <header class="auth-header">
    <a href="homepage for logged-in user.html" class="brand">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/34/Seal_of_San_Juan%2C_Metro_Manila.png?_=20200209173841" alt="San Juan City Logo" class="sj-logo">
      PRISM
    </a>
    <nav class="nav-links" aria-label="Profile page navigation">
      <a href="homepage for logged-in user.html" class="nav-link">Home</a>
      <a href="report-issue.html" class="nav-link">Report</a>
      <a href="about-us.html" class="nav-link">About</a>
      <a href="#" id="logoutBtn" class="nav-link btn-logout">Log Out</a>
    </nav>
  </header>

  <main class="profile-main">
    <header class="page-header">
      <div>
        <h1>User Profile</h1>
        <p class="subtitle">Manage your PRISM account information.</p>
      </div>
    </header>

    <section class="profile-layout">
      <!-- Identity & Stats Card -->
      <article class="identity-card">
        <div class="avatar" id="avatarInitials">U</div>
        <h2 id="displayName">Loading Name...</h2>
        <div class="role-badge" id="displayRole">Citizen Account</div>
        
        <div class="quick-stats">
          <div class="stat-box"><span>Reports</span><strong id="statTotal">0</strong></div>
          <div class="stat-box"><span>Solved</span><strong id="statSolved">0</strong></div>
          <div class="stat-box"><span>Pending</span><strong id="statPending">0</strong></div>
        </div>
      </article>

      <!-- Profile Form -->
      <form class="details-card" id="profileForm">
        <label class="form-field">
          <span>Full Name</span>
          <input type="text" id="inputName" class="form-input" required />
        </label>
        
        <label class="form-field">
          <span>Email Address</span>
          <!-- Email is readonly because it acts as the primary key in our simulated DB -->
          <input type="email" id="inputEmail" class="form-input" style="background:#e5e7eb; color:#6b7280; cursor:not-allowed;" readonly />
        </label>
        
        <label class="form-field">
          <span>Contact Number</span>
          <input type="text" id="inputContact" class="form-input" placeholder="e.g., 0912 345 6789" />
        </label>
        
        <label class="form-field">
          <span>Address</span>
          <textarea id="inputAddress" placeholder="Enter your full address"></textarea>
        </label>
        
        <div class="actions">
          <a class="btn btn-secondary" href="homepage for logged-in user.html">Cancel</a>
          <button class="btn btn-primary" type="submit">Save Profile</button>
        </div>
      </form>
    </section>
  </main>

  <script>
    // --- LOAD PROFILE DATA FROM DATABASE ---
    function loadProfile() {
      const currentEmail = localStorage.getItem('prism_current_user');
      if (!currentEmail) {
        // If somehow accessed without logging in, boot them to public home
        window.location.href = 'homepage for user without acc.html';
        return;
      }

      // Find user in DB
      const users = JSON.parse(localStorage.getItem('prism_users') || '[]');
      const user = users.find(u => u.email === currentEmail);

      let userName = user ? user.name : "Citizen User";
      let userRole = user ? user.role : "Citizen Account";

      // Calculate Reports for THIS specific user
      const reports = JSON.parse(localStorage.getItem('prism_reports') || '[]');
      let total = 0, solved = 0, pending = 0;
      
      reports.forEach(r => {
        if (r.citizen === userName) {
          total++;
          if (r.status === 'solved') solved++;
          if (r.status === 'pending') pending++;
        }
      });

      // Update UI Text
      document.getElementById('displayName').textContent = userName;
      document.getElementById('displayRole').textContent = userRole;
      document.getElementById('avatarInitials').textContent = userName.charAt(0).toUpperCase();

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statSolved').textContent = solved;
      document.getElementById('statPending').textContent = pending;

      // Fill Form
      document.getElementById('inputName').value = userName;
      document.getElementById('inputEmail').value = currentEmail;
      
      // Load extra data if we previously saved it
      document.getElementById('inputContact').value = localStorage.getItem('prism_phone_' + currentEmail) || '';
      document.getElementById('inputAddress').value = localStorage.getItem('prism_addr_' + currentEmail) || '';
    }

    // --- SAVE PROFILE DATA ---
    document.getElementById('profileForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const newName = document.getElementById('inputName').value;
      const currentEmail = document.getElementById('inputEmail').value;
      
      // Update User Array in DB
      const users = JSON.parse(localStorage.getItem('prism_users') || '[]');
      const userIndex = users.findIndex(u => u.email === currentEmail);
      
      if (userIndex !== -1) {
        users[userIndex].name = newName;
        localStorage.setItem('prism_users', JSON.stringify(users));
      }

      // Save extra details directly to localStorage
      localStorage.setItem('prism_phone_' + currentEmail, document.getElementById('inputContact').value);
      localStorage.setItem('prism_addr_' + currentEmail, document.getElementById('inputAddress').value);

      alert("Profile successfully updated!");
      loadProfile(); // Reload UI
    });

    // --- LOGOUT LOGIC ---
    document.getElementById('logoutBtn').addEventListener('click', function(e) {
      e.preventDefault();
      localStorage.removeItem('prism_current_user'); 
      window.location.href = 'homepage for user without acc.html';
    });

    // Initialize Page
    loadProfile();
  </script>
</body>
</html>
